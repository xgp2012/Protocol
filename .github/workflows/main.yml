name: Build Protocol

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        build_type: [Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake (codec only, no auth)
        shell: bash
        run: |
          cmake -S . -B build \
            -G "Visual Studio 17 2022" \
            -A x64 \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DPROTOCOL_ENABLE_AUTHENTICATION=OFF \
            -DPROTOCOL_ENABLE_CONNECTION=OFF \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"

      - name: Build
        shell: bash
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Install
        shell: bash
        run: cmake --install build --config ${{ matrix.build_type }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Protocol-windows-static-x64
          path: |
            install/lib/*
            install/include/**/*

  build-windows-full:
    runs-on: windows-latest
    strategy:
      matrix:
        build_type: [Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg
        shell: bash
        run: |
          cd $VCPKG_INSTALLATION_ROOT
          git pull
          ./bootstrap-vcpkg.bat
          ./vcpkg install openssl:x64-windows-static

      - name: Configure CMake (full)
        shell: bash
        run: |
          cmake -S . -B build \
            -G "Visual Studio 17 2022" \
            -A x64 \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_INSTALLATION_ROOT }}/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"

      - name: Build
        shell: bash
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Install
        shell: bash
        run: cmake --install build --config ${{ matrix.build_type }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Protocol-windows-full-x64
          path: |
            install/lib/*
            install/include/**/*
